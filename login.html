<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход — RED LEASING</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root { --black:#0d0d0d; --dark:#1a1a1a; --red:#e10600; --red-dark:#b00500; --gray:#8a8a8a; --white:#f5f5f5; }
  body { font-family: Arial, Helvetica, sans-serif; background:var(--black); color:var(--white); min-height:100vh; }
  a { text-decoration:none; color:inherit; }
  header { display:flex; align-items:center; justify-content:space-between; padding:20px 40px; background:var(--dark); border-bottom:2px solid var(--red); }
  .logo { font-size:26px; font-weight:bold; letter-spacing:2px; }
  .logo span { color:var(--red); }
  nav a { margin-left:24px; font-size:15px; }
  nav a:hover { color:var(--red); }

  .wrap { display:flex; align-items:center; justify-content:center; padding:60px 20px; }
  .form-box {
    width:100%; max-width:420px; background:var(--dark);
    border:1px solid #2a2a2a; border-top:3px solid var(--red);
    border-radius:12px; padding:36px;
  }
  .form-box h1 { font-size:26px; margin-bottom:6px; }
  .form-box p.sub { color:var(--gray); font-size:14px; margin-bottom:24px; }
  label { display:block; font-size:13px; color:var(--gray); margin-bottom:6px; margin-top:16px; }
  input {
    width:100%; padding:12px 14px; background:var(--black);
    border:1px solid #333; border-radius:6px; color:var(--white); font-size:15px;
  }
  input:focus { outline:none; border-color:var(--red); }
  .btn-red { width:100%; margin-top:24px; background:var(--red); color:#fff; border:none; padding:14px; border-radius:6px; font-size:16px; font-weight:bold; cursor:pointer; }
  .btn-red:hover { background:var(--red-dark); }
  .switch { text-align:center; margin-top:18px; font-size:14px; color:var(--gray); }
  .switch a { color:var(--red); }
  .msg { margin-top:16px; font-size:14px; text-align:center; }
</style>
</head>
<body>
  <header>
    <a href="index.html" class="logo">RED<span>LEASING</span></a>
    <nav>
      <a href="index.html">Главная</a>
      <a href="catalog.html">Каталог</a>
      <a href="login.html">Вход</a>
      <a href="register.html">Регистрация</a>
    </nav>
  </header>

  <div class="wrap">
    <form class="form-box" id="loginForm">
      <h1>Вход</h1>
      <p class="sub">Войдите в свой аккаунт RED LEASING</p>

      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" placeholder="example@mail.ru" required>

      <label for="password">Пароль</label>
      <input type="password" id="password" name="password" placeholder="Ваш пароль" required>

      <button type="submit" class="btn-red">Войти</button>
      <p class="msg" id="msg"></p>

      <div class="switch">Нет аккаунта? <a href="register.html">Зарегистрироваться</a></div>
    </form>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', async function(e){
      e.preventDefault();

      const credentials = {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      };

      /* ============================================================*/
         try {
           const response = await fetch("login.php", {
             method: 'POST',
             headers: { 'Content-Type': 'application/json' },
             body: JSON.stringify(credentials)
           });
           const result = await response.json();
           if (result.success) {
            window.location.href = result.redirect;
           } else {
             msg.textContent = result.message || 'Неверный логин или пароль';
             msg.style.color = '#e10600';
           }
         } catch (err) {
           msg.textContent = 'Ошибка соединения с сервером';
           msg.style.color = '#e10600';
         }
         /*============================================================ */
    });
  </script>
</body>
</html>
